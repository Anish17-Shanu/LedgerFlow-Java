name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
      - name: Compile
        run: javac -d out src/com/ledgerflow/model/TransactionRecord.java src/com/ledgerflow/ReconciliationEngine.java src/com/ledgerflow/Main.java
